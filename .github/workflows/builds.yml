name: Tests

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

jobs:
    build_and_test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
            - name: Install
              run: npm ci
            - name: Test browsers
              run: npm run test
    build_and_test_macos:
        runs-on: macos-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
            - name: Install
              run: npm ci
            - name: Test browsers
              run: npm run test
